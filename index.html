<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d47;
    --accent: #00c6ff;
    --accent2: #7b5ea7;
    --green: #00e5a0;
    --orange: #ff7043;
    --text: #e8edf5;
    --muted: #6b7a99;
    --card-glow: 0 0 30px rgba(0,198,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid de fondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,198,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,198,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-left p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .refresh-info { font-size: 12px; color: var(--muted); }

  .btn-refresh {
    background: linear-gradient(135deg, var(--accent), #0077b6);
    border: none;
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-refresh:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-refresh:active { transform: translateY(0); }

  .btn-refresh svg { transition: transform 0.4s; }
  .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }



  /* SEARCH */
  .search-bar {
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .search-input-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input-wrap input:focus { border-color: var(--accent); }

  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  /* KPI CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--card-glow);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .kpi-card:hover { transform: translateY(-2px); border-color: rgba(0,198,255,0.3); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--kpi-color, var(--accent));
    border-radius: 14px 14px 0 0;
  }

  .kpi-icon {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--kpi-color, var(--accent));
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* CHARTS */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    box-shadow: var(--card-glow);
  }

  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title span {
    font-size: 16px;
  }

  .chart-wrap { position: relative; height: 200px; }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    box-shadow: var(--card-glow);
    overflow-x: auto;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .table-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(30,45,71,0.5);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(0,198,255,0.04); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 11px 14px;
    color: var(--text);
    vertical-align: middle;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-si { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.25); }
  .badge-no { background: rgba(255,112,67,0.12); color: var(--orange); border: 1px solid rgba(255,112,67,0.25); }
  .badge-plan { background: rgba(0,198,255,0.12); color: var(--accent); border: 1px solid rgba(0,198,255,0.25); }
  .badge-other { background: rgba(123,94,167,0.12); color: #a78bfa; border: 1px solid rgba(123,94,167,0.25); }

  .name-cell { font-weight: 500; }
  .phone-cell { font-family: monospace; font-size: 12px; color: var(--muted); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* LAST UPDATE */
  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 24px;
    padding-bottom: 24px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(0,229,160,0.4); }
  .toast.error { border-color: rgba(255,112,67,0.4); }

  @media (max-width: 600px) {
    .wrapper { padding: 16px; }
    .kpi-value { font-size: 28px; }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>📋 Dashboard de Leads</h1>
      <p>Datos en tiempo real desde Google Sheets</p>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        <span id="statusText">Conectado</span>
      </div>
      <span class="refresh-info" id="nextRefresh">Próximo refresh en 30s</span>
      <button class="btn-refresh" id="btnRefresh" onclick="fetchData(true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Actualizar
      </button>
    </div>
  </header>

  <!-- SEARCH + FILTERS -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="searchInput" placeholder="Buscar por nombre o teléfono..." oninput="renderTable()">
    </div>
    <select class="filter-select" id="filterUsado" onchange="renderTable()">
      <option value="">Todos - Entrega Usado</option>
      <option value="si">✅ Sí entrega</option>
      <option value="no">❌ No entrega</option>
    </select>
    <select class="filter-select" id="filterFinanciacion" onchange="renderTable()">
      <option value="">Todos - Financiación</option>
      <option value="si">✅ Con financiación</option>
      <option value="no">❌ Sin financiación</option>
      <option value="plan">📋 Plan</option>
    </select>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card" style="--kpi-color: var(--accent)">
      <div class="kpi-icon">👥</div>
      <div class="kpi-value" id="kpiTotal">—</div>
      <div class="kpi-label">Total de Leads</div>
    </div>
    <div class="kpi-card" style="--kpi-color: var(--green)">
      <div class="kpi-icon">🔄</div>
      <div class="kpi-value" id="kpiUsado">—</div>
      <div class="kpi-label">Entregan Usado</div>
    </div>
    <div class="kpi-card" style="--kpi-color: #a78bfa">
      <div class="kpi-icon">💳</div>
      <div class="kpi-value" id="kpiFinanciacion">—</div>
      <div class="kpi-label">Con Financiación</div>
    </div>
    <div class="kpi-card" style="--kpi-color: var(--orange)">
      <div class="kpi-icon">📋</div>
      <div class="kpi-value" id="kpiPlanes">—</div>
      <div class="kpi-label">En Plan/Lancha</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title"><span>🔄</span> Entrega de Usado</div>
      <div class="chart-wrap"><canvas id="chartUsado"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>💳</span> Tipo de Financiación</div>
      <div class="chart-wrap"><canvas id="chartFinanciacion"></canvas></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">📋 Lista de Leads</div>
      <div class="count-badge" id="tableCount">0 leads</div>
    </div>
    <div id="tableContainer">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Cargando datos...</p>
      </div>
    </div>
  </div>

  <div class="last-update" id="lastUpdate"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let allData = [];
let chartUsado = null;
let chartFinanciacion = null;
let countdownInterval = null;
let refreshInterval = null;
const REFRESH_SECONDS = 30;

const SHEET_ID = '1eYVpy1qEdCy91aqyV77jTkqFbYPOT4ubSouZokIXLSk';
const SHEET_GID = '0';

function getSheetUrl() {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

function normalizeText(str) {
  return (str || '').trim().toLowerCase();
}

async function fetchData(manual = false) {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');

  try {
    const url = getSheetUrl();
    const res = await fetch(url);
    if (!res.ok) throw new Error('No se pudo acceder al sheet');
    const csv = await res.text();

    const result = Papa.parse(csv, { header: true, skipEmptyLines: true });
    allData = result.data;

    updateKPIs();
    updateCharts();
    renderTable();

    const now = new Date().toLocaleTimeString('es-AR');
    document.getElementById('lastUpdate').textContent = `Última actualización: ${now}`;
    document.getElementById('statusText').textContent = 'Conectado';

    if (manual) showToast(`${allData.length} leads cargados`);
    resetCountdown();

  } catch (err) {
    document.getElementById('statusText').textContent = 'Error';
    showToast('No se pudo cargar el sheet. Verificá que sea público.', 'error');
    console.error(err);
  }

  btn.classList.remove('loading');
}

function resetCountdown() {
  clearInterval(countdownInterval);
  clearInterval(refreshInterval);
  let secs = REFRESH_SECONDS;
  document.getElementById('nextRefresh').textContent = `Próximo refresh en ${secs}s`;
  countdownInterval = setInterval(() => {
    secs--;
    document.getElementById('nextRefresh').textContent = `Próximo refresh en ${secs}s`;
    if (secs <= 0) { clearInterval(countdownInterval); }
  }, 1000);
  refreshInterval = setTimeout(() => fetchData(false), REFRESH_SECONDS * 1000);
}

function updateKPIs() {
  const total = allData.length;
  const usado = allData.filter(r => normalizeText(r['entrega usado']) === 'si').length;
  const financiados = allData.filter(r => {
    const f = normalizeText(r['Financiacion'] || r['financiacion'] || r['Financiación'] || '');
    return f === 'si' || f === 'sí';
  }).length;
  const planes = allData.filter(r => {
    const f = normalizeText(r['Financiacion'] || r['financiacion'] || r['Financiación'] || '');
    return f.includes('plan') || f.includes('lancha');
  }).length;

  animateNumber('kpiTotal', total);
  animateNumber('kpiUsado', usado);
  animateNumber('kpiFinanciacion', financiados);
  animateNumber('kpiPlanes', planes);
}

function animateNumber(id, target) {
  const el = document.getElementById(id);
  const start = parseInt(el.textContent) || 0;
  const steps = 20;
  const step = (target - start) / steps;
  let current = start;
  let i = 0;
  const t = setInterval(() => {
    current += step;
    i++;
    el.textContent = Math.round(current);
    if (i >= steps) { el.textContent = target; clearInterval(t); }
  }, 16);
}

function getColumnValue(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined) return row[k];
  }
  return '';
}

function updateCharts() {
  const usadoCounts = { 'Sí': 0, 'No': 0, 'Otro': 0 };
  const finCounts = {};

  allData.forEach(r => {
    const usado = normalizeText(getColumnValue(r, 'entrega usado', 'Entrega usado', 'entrega_usado'));
    if (usado === 'si' || usado === 'sí') usadoCounts['Sí']++;
    else if (usado === 'no') usadoCounts['No']++;
    else usadoCounts['Otro']++;

    const fin = (getColumnValue(r, 'Financiacion', 'financiacion', 'Financiación') || 'Sin datos').trim();
    const finKey = fin.charAt(0).toUpperCase() + fin.slice(1).toLowerCase();
    finCounts[finKey] = (finCounts[finKey] || 0) + 1;
  });

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: { color: '#6b7a99', font: { family: 'DM Sans', size: 12 }, padding: 16 }
      }
    }
  };

  // Chart Usado
  if (chartUsado) chartUsado.destroy();
  chartUsado = new Chart(document.getElementById('chartUsado'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(usadoCounts).filter(k => usadoCounts[k] > 0),
      datasets: [{
        data: Object.values(usadoCounts).filter(v => v > 0),
        backgroundColor: ['rgba(0,229,160,0.8)', 'rgba(255,112,67,0.8)', 'rgba(107,122,153,0.5)'],
        borderColor: ['#00e5a0', '#ff7043', '#6b7a99'],
        borderWidth: 1.5,
        hoverOffset: 6
      }]
    },
    options: { ...chartDefaults, cutout: '65%' }
  });

  // Chart Financiación
  if (chartFinanciacion) chartFinanciacion.destroy();
  const finLabels = Object.keys(finCounts);
  const finColors = ['rgba(0,198,255,0.8)', 'rgba(167,139,250,0.8)', 'rgba(0,229,160,0.8)', 'rgba(255,112,67,0.8)', 'rgba(251,191,36,0.8)'];
  chartFinanciacion = new Chart(document.getElementById('chartFinanciacion'), {
    type: 'bar',
    data: {
      labels: finLabels,
      datasets: [{
        label: 'Leads',
        data: finLabels.map(k => finCounts[k]),
        backgroundColor: finLabels.map((_, i) => finColors[i % finColors.length]),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        x: { ticks: { color: '#6b7a99', font: { family: 'DM Sans' } }, grid: { color: 'rgba(30,45,71,0.5)' } },
        y: { ticks: { color: '#6b7a99', font: { family: 'DM Sans' }, stepSize: 1 }, grid: { color: 'rgba(30,45,71,0.5)' }, beginAtZero: true }
      },
      plugins: { ...chartDefaults.plugins, legend: { display: false } }
    }
  });
}

function getBadgeClass(val) {
  const v = normalizeText(val);
  if (v === 'si' || v === 'sí') return 'badge-si';
  if (v === 'no') return 'badge-no';
  if (v.includes('plan') || v.includes('lancha')) return 'badge-plan';
  return 'badge-other';
}

function renderTable() {
  const search = normalizeText(document.getElementById('searchInput').value);
  const filterUsado = normalizeText(document.getElementById('filterUsado').value);
  const filterFin = normalizeText(document.getElementById('filterFinanciacion').value);

  let filtered = allData.filter(r => {
    const nombre = normalizeText(r['Nombre'] || '');
    const tel = normalizeText(r['Teléfono'] || r['Telefono'] || '');
    const usado = normalizeText(getColumnValue(r, 'entrega usado', 'Entrega usado'));
    const fin = normalizeText(getColumnValue(r, 'Financiacion', 'financiacion', 'Financiación'));

    const matchSearch = !search || nombre.includes(search) || tel.includes(search);
    const matchUsado = !filterUsado || usado.startsWith(filterUsado);
    const matchFin = !filterFin || fin.startsWith(filterFin) || (filterFin === 'plan' && fin.includes('plan'));

    return matchSearch && matchUsado && matchFin;
  });

  document.getElementById('tableCount').textContent = `${filtered.length} lead${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>No se encontraron leads con esos filtros.</p>
      </div>`;
    return;
  }

  const rows = filtered.map((r, i) => {
    const nombre = r['Nombre'] || '—';
    const tel = r['Teléfono'] || r['Telefono'] || '—';
    const usado = getColumnValue(r, 'entrega usado', 'Entrega usado') || '—';
    const fin = getColumnValue(r, 'Financiacion', 'financiacion', 'Financiación') || '—';

    return `<tr>
      <td><span style="color:var(--muted);font-size:11px;">${i+1}</span></td>
      <td class="name-cell">${nombre}</td>
      <td class="phone-cell">📞 ${tel}</td>
      <td><span class="badge ${getBadgeClass(usado)}">${usado}</span></td>
      <td><span class="badge ${getBadgeClass(fin)}">${fin}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Entrega Usado</th>
          <th>Financiación</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Iniciar
fetchData(true);
</script>
</body>
</html>
